# Reusable consumer-test workflow. Triggered by manager's
# repository_dispatch:[upstream-bumped] in each affected consumer.
#
# Runs the consumer's own test suite against the just-published
# bumped versions. Result lives in the consumer's Actions tab.
#
# Standardized on bun in line with the org-wide migration. Server is
# the only repo that still routes through npm (see its package-lock.json
# branch in deploy-reusable.yml); consumer tests run everywhere else.

name: Consumer test (reusable)

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: false
      GH_PACKAGES_TOKEN:
        required: false
      INFISICAL_CLIENT_ID:
        required: false
      INFISICAL_CLIENT_SECRET:
        required: false
      INFISICAL_PROJECT_ID:
        required: false
      INFISICAL_DOMAIN:
        required: false

jobs:
  consumer-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Echo dispatch payload
        run: |
          echo "Source repo:    ${{ github.event.client_payload.source_repo }}"
          echo "Source SHA:     ${{ github.event.client_payload.source_sha }}"
          echo "Bumped pkgs:    ${{ github.event.client_payload.bumped_packages }}"
          echo "Bumped vers:    ${{ github.event.client_payload.bumped_versions }}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          # Authenticated GH API lookup for `bun-version: latest` —
          # avoids 401 on rate-limit exhaustion. See test-reusable.yml
          # for full rationale.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache bun + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Configure dual-registry auth
        # Trim trailing whitespace from tokens — see deploy-reusable
        # for the full diagnosis. Mirrors the same fix; mandatory for
        # every reusable workflow that writes _authToken to .npmrc.
        env:
          _RAW_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          _RAW_GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          NPM_TOKEN=$(printf '%s' "$_RAW_NPM_TOKEN" | tr -d '\n\r ')
          GH_TOKEN=$(printf '%s' "$_RAW_GH_TOKEN" | tr -d '\n\r ')
          # Write to both: NPM_CONFIG_USERCONFIG (npm reads) + workspace
          # root .npmrc (bun reads from cwd up; doesn't honor
          # NPM_CONFIG_USERCONFIG). See deploy-reusable for the diagnosis.
          write_npmrc() {
            local target="$1"
            {
              [ -n "$NPM_TOKEN" ] && echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" && echo "always-auth=true"
              [ -n "$GH_TOKEN" ] && echo "@symbo-ls:registry=https://npm.pkg.github.com" && echo "//npm.pkg.github.com/:_authToken=$GH_TOKEN"
            } >> "$target"
          }
          if [ -z "$NPM_TOKEN" ]; then
            # Fail fast with an actionable pointer instead of letting
            # bun install 404 on every restricted package (looks like a
            # network outage rather than a missing secret).
            if [ "${GITHUB_ACTOR:-}" = "dependabot[bot]" ]; then
              echo "::error::NPM_TOKEN is empty on a Dependabot-triggered run."
              echo "::error::Dependabot uses its own secrets namespace. Add NPM_TOKEN at:"
              echo "::error::  https://github.com/organizations/symbo-ls/settings/secrets/dependabot"
            else
              echo "::error::NPM_TOKEN is empty. Set the org-level Actions secret at:"
              echo "::error::  https://github.com/organizations/symbo-ls/settings/secrets/actions"
            fi
            exit 1
          fi
          write_npmrc "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          write_npmrc "$GITHUB_WORKSPACE/.npmrc"

      - name: Install (pulls newly published upstream versions)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_SECRET: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN_NPM: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        # `bun install` honors `workspaces` in package.json natively —
        # no `--workspaces` flag like npm. `--ignore-scripts` suppresses
        # postinstall/prepare so dist-only packages don't build before
        # devDeps are linked; explicit build step runs them next.
        #
        # Retry on npm propagation race: consumer-test runs precisely
        # when upstream just published, so the race window is tightest
        # here. Linear backoff (15s/30s/45s/60s) on the propagation-race
        # signature only — other errors fail fast.
        run: |
          LOG=$(mktemp)
          MAX_ATTEMPTS=5
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            if bun install --ignore-scripts 2>&1 | tee "$LOG"; then
              exit 0
            fi
            if ! grep -qE "(No version matching|ETARGET|failed to resolve)" "$LOG"; then
              echo "::error::bun install failed (not a propagation race) — failing fast"
              exit 1
            fi
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              wait=$((15 * attempt))
              echo "::warning::npm propagation race detected (attempt $attempt/$MAX_ATTEMPTS), sleeping ${wait}s before retry"
              sleep "$wait"
            fi
          done
          echo "::error::bun install failed after $MAX_ATTEMPTS attempts — npm propagation did not catch up"
          exit 1

      - name: Build workspace packages
        # `bun run --filter '*' build` runs the `build` script in every
        # workspace package that declares one (matches the npm
        # `--workspaces --if-present` semantics).
        run: bun run --filter '*' build 2>&1 | tail -100 || true

      - name: Run tests
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          INFISICAL_DOMAIN: ${{ secrets.INFISICAL_DOMAIN }}
          CHANNEL: ${{ github.ref_name == 'main' && 'test' || github.ref_name }}
        run: |
          if [ -f "scripts/test.sh" ]; then
            bash scripts/test.sh
          elif jq -e '.scripts.test' package.json > /dev/null; then
            bun run test
          else
            echo "No tests configured."
          fi
