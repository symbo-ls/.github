# Reusable deploy workflow. Manager dispatches this on consumer repos
# that have cloud surfaces (server, workspace).
#
# Each consumer plugs its actual cloud-push logic into a script at
# scripts/deploy-from-release-manager.sh (or scripts/deploy.sh as a
# fallback). This reusable workflow handles the install + auth
# scaffolding identically across all consumers.

name: Deploy from release-manager (reusable)

on:
  workflow_call:
    inputs:
      version:
        description: 'Release tag (e.g. 3.14.6 — without the v prefix)'
        required: true
        type: string
      source_repo:
        description: 'Consumer repo whose push triggered this release'
        required: false
        type: string
        default: 'release-manager'
      target_env:
        description: 'Channel to deploy against (test/staging/production)'
        required: false
        type: string
        default: 'test'
    secrets:
      NPM_TOKEN:
        required: false
      GH_PACKAGES_TOKEN:
        required: false
      IDENTITY_PROVIDER:
        required: false
      SA_NAME:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
    # GitHub's expression parser doesn't allow `secrets` context in
    # step-level `if:` conditions. Pull the existence check up to job
    # env (secrets ARE allowed at that layer) and gate the WIF chain
    # on `env.HAS_WIF` below.
    env:
      HAS_WIF: ${{ (secrets.IDENTITY_PROVIDER != '' && secrets.SA_NAME != '') && 'true' || 'false' }}
    steps:
      - name: Log dispatch source
        run: |
          echo "Deploying ${{ github.repository }} at v${{ inputs.version }}"
          echo "Triggered by release of: ${{ inputs.source_repo }}"
          echo "Target env: ${{ inputs.target_env }}"

      # Single checkout (full history so all tags are present), then
      # runtime decision: prefer the version tag; fall back to main HEAD
      # for test env; hard-fail for staging/production. This avoids
      # actions/checkout's continue-on-error leaving a partial state
      # behind that breaks the fallback.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve checkout ref (tag if exists, else main)
        id: resolve_ref
        run: |
          TAG="v${{ inputs.version }}"
          if git rev-parse --verify --quiet "refs/tags/$TAG" > /dev/null; then
            git checkout "$TAG"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "ref=$TAG" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploying ${{ github.repository }}@$TAG"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail on missing tag for staging/production
        if: steps.resolve_ref.outputs.tag_exists != 'true' && (inputs.target_env == 'staging' || inputs.target_env == 'production')
        run: |
          echo "::error::Tag v${{ inputs.version }} does not exist on ${{ github.repository }}."
          echo "::error::Refusing to fall back to main HEAD for target_env=${{ inputs.target_env }} — that would deploy whatever's on main, not the requested version."
          echo "::error::Either push the tag manually, run the auto-publish flow first to create it, or pick a different version."
          exit 1

      - name: Warn if falling back to main (test env)
        if: steps.resolve_ref.outputs.tag_exists != 'true'
        run: echo "::warning::Tag v${{ inputs.version }} not found on ${{ github.repository }}; deploying from main HEAD (target_env=${{ inputs.target_env }})."

      - uses: actions/setup-node@v4
        with:
          # Wrangler 4.x requires Node.js >= 22. Bumping from 20 keeps
          # `wrangler deploy` working across every worker; npm 10 (bundled
          # with Node 22) handles server's package-lock.json install fine.
          node-version: '22'
          # NO `registry-url` here. setup-node@v4 with registry-url writes
          # an .npmrc that includes `_authToken=${NODE_AUTH_TOKEN}` — an
          # env-var template that npm expands at install time. We don't
          # set NODE_AUTH_TOKEN, so the template stays literal/empty, the
          # subsequent `Configure dual-registry auth` step appends its
          # OWN _authToken line, and bun's parser uses the FIRST one →
          # empty auth → 404 on every restricted @symbo.ls/* package.
          # The Configure step writes a complete .npmrc on its own. Trust it.

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          # Authenticated GH API lookup for `bun-version: latest` —
          # avoids 401 on rate-limit exhaustion. See test-reusable.yml
          # for full rationale.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
          key: bun-${{ runner.os }}-${{ inputs.version }}-${{ hashFiles('**/package.json', 'bun.lock', 'package-lock.json') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ inputs.version }}-
            bun-${{ runner.os }}-

      # Fetch NPM_TOKEN from Infisical critical (canonical source) when
      # the consumer provided WIF inputs; fall back to the repo-level
      # `secrets.NPM_TOKEN` otherwise so consumers without GCP/Infisical
      # setup keep working unchanged. Same Path B pattern the server
      # repo uses for deploy-cloudflare-packages / post-deploy / dev /
      # migrate. Repo-level NPM_TOKEN secrets drift on rotation and
      # silently 404 on restricted @symbo.ls/* deps — Infisical is the
      # one source that stays correct.
      - name: Authenticate to Google Cloud via WIF (for NPM_TOKEN)
        id: gcp-auth
        if: env.HAS_WIF == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SA_NAME }}

      - name: Set up gcloud (for Infisical bootstrap)
        if: steps.gcp-auth.outcome == 'success'
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Infisical CLI (for NPM_TOKEN)
        if: steps.gcp-auth.outcome == 'success'
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo bash
          sudo apt-get install -y infisical

      - name: Fetch NPM_TOKEN from Infisical critical project
        id: infisical-npm-token
        if: steps.gcp-auth.outcome == 'success'
        env:
          TARGET_ENV: ${{ inputs.target_env }}
        run: |
          # Map deploy target_env to Infisical critical env slug.
          # development/dev are equivalent here; production maps to prod.
          case "$TARGET_ENV" in
            development|dev) CRIT_ENV=dev ;;
            production|prod) CRIT_ENV=prod ;;
            *)               CRIT_ENV="$TARGET_ENV" ;;
          esac
          INF_DOMAIN=$(gcloud secrets versions access latest --secret=infisical_domain --project=symbols-main)
          INF_CID=$(gcloud secrets versions access latest --secret=infisical_machine_client_id_${TARGET_ENV} --project=symbols-main 2>/dev/null || \
                    gcloud secrets versions access latest --secret=infisical_machine_client_id_development --project=symbols-main)
          INF_CSEC=$(gcloud secrets versions access latest --secret=infisical_client_secret_${TARGET_ENV} --project=symbols-main 2>/dev/null || \
                     gcloud secrets versions access latest --secret=infisical_client_secret_development --project=symbols-main)
          INF_TOKEN=$(infisical login --method=universal-auth \
            --client-id="$INF_CID" --client-secret="$INF_CSEC" \
            --domain="$INF_DOMAIN" --plain --silent)
          INF_CRIT=ba3c1190-2fb7-4615-8a27-6a19f20825d5
          NPM_TOKEN=$(infisical secrets get NPM_TOKEN \
            --domain="$INF_DOMAIN" --projectId="$INF_CRIT" --env="$CRIT_ENV" \
            --token="$INF_TOKEN" --plain --silent)
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN missing in Infisical critical/$CRIT_ENV"
            exit 1
          fi
          echo "::add-mask::$NPM_TOKEN"
          echo "token=$NPM_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Configure dual-registry auth
        # Two things to get right here:
        #
        # 1. Trim trailing whitespace from each token. GitHub secrets are
        #    stored as raw bytes; if pasted with a trailing newline the
        #    embedded \n in `_authToken=$NPM_TOKEN` corrupts the auth
        #    header. The registry treats the request as anonymous and
        #    returns 404 for restricted packages.
        #
        # 2. Write .npmrc to BOTH locations:
        #    - $NPM_CONFIG_USERCONFIG (set by setup-node) — npm reads this
        #    - ./.npmrc in the workspace root — bun reads from cwd up the
        #      filesystem, and DOES NOT honor NPM_CONFIG_USERCONFIG (last
        #      verified bun 1.3). So a workflow that uses `bun install`
        #      without a sibling .npmrc gets anonymous auth and 404s on
        #      every restricted @symbo.ls/* package.
        #    workspace happens to ship a (gitignored) package-lock.json,
        #    so its install path goes through npm and works. sdk has no
        #    lock — falls through to `bun install --no-save` — and used
        #    to fail mysteriously. Writing to both paths fixes it for
        #    every consumer.
        env:
          _RAW_NPM_TOKEN: ${{ steps.infisical-npm-token.outputs.token || secrets.NPM_TOKEN }}
          _RAW_GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          NPM_TOKEN=$(printf '%s' "$_RAW_NPM_TOKEN" | tr -d '\n\r ')
          GH_TOKEN=$(printf '%s' "$_RAW_GH_TOKEN" | tr -d '\n\r ')
          write_npmrc() {
            local target="$1"
            {
              [ -n "$NPM_TOKEN" ] && echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" && echo "always-auth=true"
              [ -n "$GH_TOKEN" ] && echo "@symbo-ls:registry=https://npm.pkg.github.com" && echo "//npm.pkg.github.com/:_authToken=$GH_TOKEN"
            } >> "$target"
          }
          write_npmrc "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          write_npmrc "$GITHUB_WORKSPACE/.npmrc"

      - name: Install
        env:
          NPM_TOKEN: ${{ steps.infisical-npm-token.outputs.token || secrets.NPM_TOKEN }}
          NPM_SECRET: ${{ steps.infisical-npm-token.outputs.token || secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN_NPM: ${{ steps.infisical-npm-token.outputs.token || secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          # Match test-reusable.yml: npm install with package-lock.json
          # uses lock-pinned tarball URLs and skips scope-metadata lookups
          # that bun's resolver hits (and 404s on restricted @symbo.ls/*).
          #
          # NOTE: do NOT pass --ignore-scripts here. Unlike test-reusable
          # (which builds workspace packages explicitly and doesn't need
          # third-party postinstall scripts), this deploy path runs
          # `wrangler deploy` which dynamically requires the right
          # platform-native workerd binary (@cloudflare/workerd-linux-64
          # for the GitHub runner). Wrangler 4.x relies on its postinstall
          # to pick / wire the correct optional dep into place; suppressing
          # postinstalls leaves wrangler unable to load workerd:
          #   Error: The package "@cloudflare/workerd-linux-64" could not
          #   be found, and is needed by workerd.
          # See run 25883192855 for the failure signature.
          # Retry wrapper for npm propagation race: release-manager
          # cascades publish then push consumer chore(release) bumps;
          # this deploy fires on the chore(release) commit, but npm
          # read replicas may not have synced yet. Linear backoff
          # (15s/30s/45s/60s) on the propagation-race signature only —
          # other errors fail fast.
          LOG=$(mktemp)
          MAX_ATTEMPTS=5
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            if [ -f package-lock.json ]; then
              CMD="npm install --no-audit"
            else
              CMD="bun install --no-save"
            fi
            if $CMD 2>&1 | tee "$LOG"; then
              exit 0
            fi
            if ! grep -qE "(No version matching|ETARGET|failed to resolve|notarget)" "$LOG"; then
              echo "::error::install failed (not a propagation race) — failing fast"
              exit 1
            fi
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              wait=$((15 * attempt))
              echo "::warning::npm propagation race detected (attempt $attempt/$MAX_ATTEMPTS), sleeping ${wait}s before retry"
              sleep "$wait"
            fi
          done
          echo "::error::install failed after $MAX_ATTEMPTS attempts — npm propagation did not catch up"
          exit 1

      - name: Build and deploy
        env:
          VERSION: ${{ inputs.version }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          TARGET_ENV: ${{ inputs.target_env }}
          NODE_ENV: ${{ inputs.target_env }}
          # wrangler v4 (and v3 since the deprecation cycle) wants
          # CLOUDFLARE_API_TOKEN. The legacy CLOUDFLARE_EMAIL +
          # CLOUDFLARE_API_KEY pair still works for some endpoints but
          # not for Workers deploy in non-interactive mode. Pass the
          # Workers token through here so per-worker `wrangler deploy`
          # calls authenticate without prompting.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Legacy pair kept for back-compat with any workflow that
          # still consults them — wrangler prefers API_TOKEN when both
          # are set.
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
        run: |
          if [ -x "./scripts/deploy-from-release-manager.sh" ]; then
            ./scripts/deploy-from-release-manager.sh
          elif [ -x "./scripts/deploy.sh" ]; then
            ./scripts/deploy.sh
          else
            echo "::warning::No deploy script — set up scripts/deploy-from-release-manager.sh"
            echo "::notice::Skipping deploy. release-manager dispatched at v${VERSION} from ${SOURCE_REPO}."
          fi
