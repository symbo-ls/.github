# Reusable Test workflow.
#
# Called from each consumer repo's tiny .github/workflows/test.yml
# wrapper. Single source of truth: change this file in release-manager,
# every consumer's next push picks up the change.
#
# Behavior contract:
#   - install workspace deps (bun install)
#   - build any --if-present builds (bun run build --workspaces)
#   - run scripts/test.sh if present, else `bun test`, else no-op pass
#   - test-result is the workflow's conclusion (gates notify-release)
#
# Why bun: org-wide migration away from npm. Bun installs an order of
# magnitude faster, honors workspaces natively, and matches the runtime
# consumer repos already use for `bun run build`. Server still runs npm
# (binary deps); every other repo standardizes on bun via this workflow.

name: Test (reusable)

on:
  workflow_call:
    inputs:
      # Optional environment hints for repos that need them in scripts/test.sh
      # (sdk uses CHANNEL to pick the live API target, for example).
      channel:
        type: string
        required: false
        default: ''
      suite:
        type: string
        required: false
        default: 'smoke'
    secrets:
      # Static, read-only on @symbo.ls. Set per consumer repo.
      NPM_TOKEN:
        required: false
      # Static, Classic PAT read:packages only on @symbo-ls. Per consumer.
      GH_PACKAGES_TOKEN:
        required: false
      # Optional: only sdk uses these (live API smoke tests). Most repos
      # leave them unset and the test step is a no-op for that branch.
      INFISICAL_CLIENT_ID:
        required: false
      INFISICAL_CLIENT_SECRET:
        required: false
      INFISICAL_PROJECT_ID:
        required: false
      INFISICAL_DOMAIN:
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          # `bun-version: latest` makes setup-bun call the
          # oven-sh/bun GitHub API to resolve the latest tag.
          # Anonymous calls share the runner-IP rate limit pool and
          # 401 when exhausted (saw across workspace Test runs incl.
          # 26337932317 + dev/preview runs). Passing GITHUB_TOKEN
          # switches to the per-job authenticated quota (1000/hr).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Cache bun's global install cache + repo node_modules. Bun keys
      # its store by package@version, so a cold cache after a release
      # only re-downloads the new tarballs.
      - name: Cache bun + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Configure dual-registry auth
        # Trim trailing whitespace from tokens before writing .npmrc.
        # GitHub secrets are stored as raw bytes — a trailing newline
        # in the secret value embeds \n in the _authToken= line, which
        # corrupts the Authorization header npm sends. The registry
        # then treats the request as anonymous and 404s on restricted
        # @symbo.ls/* packages.
        env:
          _RAW_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          _RAW_GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          NPM_TOKEN=$(printf '%s' "$_RAW_NPM_TOKEN" | tr -d '\n\r ')
          GH_TOKEN=$(printf '%s' "$_RAW_GH_TOKEN" | tr -d '\n\r ')
          # Write to both the user-config path AND the workspace-root
          # .npmrc — bun reads from cwd upward and does NOT honor
          # NPM_CONFIG_USERCONFIG (npm-only env var). See
          # deploy-reusable for the full diagnosis.
          write_npmrc() {
            local target="$1"
            {
              if [ -n "$NPM_TOKEN" ]; then
                echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN"
                echo "always-auth=true"
              fi
              if [ -n "$GH_TOKEN" ]; then
                echo "@symbo-ls:registry=https://npm.pkg.github.com"
                echo "//npm.pkg.github.com/:_authToken=$GH_TOKEN"
              fi
            } >> "$target"
          }
          if [ -z "$NPM_TOKEN" ]; then
            # Fail fast with an actionable pointer. The previous behavior
            # (warn-and-continue) made the install step 404 on every
            # restricted @symbo.ls/* package, which looks like a network
            # outage rather than a missing secret — burns 20+ min of
            # debugging per occurrence.
            if [ "${GITHUB_ACTOR:-}" = "dependabot[bot]" ]; then
              echo "::error::NPM_TOKEN is empty on a Dependabot-triggered run."
              echo "::error::Dependabot has its own secrets namespace (separate from Actions secrets) since Sept 2021."
              echo "::error::Add NPM_TOKEN (and GH_PACKAGES_TOKEN) at https://github.com/organizations/symbo-ls/settings/secrets/dependabot"
            else
              echo "::error::NPM_TOKEN is empty. Configure the org-level Actions secret:"
              echo "::error::  https://github.com/organizations/symbo-ls/settings/secrets/actions"
              echo "::error::(Use the granular access token with read on @symbo.ls/* on npmjs.org.)"
            fi
            exit 1
          fi
          write_npmrc "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          write_npmrc "$GITHUB_WORKSPACE/.npmrc"

      - name: Install
        env:
          # Aliases for repos with project-local .npmrc using these names.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_SECRET: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN_NPM: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        # `bun install` honors `workspaces` in package.json natively —
        # no `--workspaces` flag like npm. `--ignore-scripts` suppresses
        # postinstall/prepare hooks so dist-only packages don't try to
        # build before their devDeps are linked; we run them explicitly
        # in the next step.
        #
        # Retry on npm propagation race: release-manager publishes
        # packages and pushes consumer chore(release) bumps in lockstep,
        # but npm has multiple read replicas with eventual consistency.
        # An install that hits an un-synced replica fails with
        #   error: No version matching "^X.Y.Z" found for specifier "@symbo.ls/*"
        # The retry waits with linear backoff (15s, 30s, 45s, 60s) on
        # this specific signature only — other errors fail fast.
        run: |
          LOG=$(mktemp)
          MAX_ATTEMPTS=5
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            if bun install --ignore-scripts 2>&1 | tee "$LOG"; then
              exit 0
            fi
            if ! grep -qE "(No version matching|ETARGET|failed to resolve)" "$LOG"; then
              echo "::error::bun install failed (not a propagation race) — failing fast"
              exit 1
            fi
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              wait=$((15 * attempt))
              echo "::warning::npm propagation race detected (attempt $attempt/$MAX_ATTEMPTS), sleeping ${wait}s before retry"
              sleep "$wait"
            fi
          done
          echo "::error::bun install failed after $MAX_ATTEMPTS attempts — npm propagation did not catch up"
          exit 1

      # Some workspace packages ship dist-only and need an explicit
      # build because --ignore-scripts above suppressed prepare hooks.
      # `bun run --filter '*' build` runs the `build` script in every
      # workspace package that declares one (matches the npm
      # `--workspaces --if-present` semantics).
      - name: Build workspace packages
        run: bun run --filter '*' build 2>&1 | tail -100 || true

      - name: Test
        env:
          # Pass through Infisical creds for repos that need live API
          # smoke tests (sdk). Empty when not set; scripts/test.sh
          # gracefully skips Infisical when missing.
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          INFISICAL_DOMAIN: ${{ secrets.INFISICAL_DOMAIN }}
          # Channel routing: caller passes inputs.channel; if empty,
          # default to current branch with main → test alias.
          CHANNEL: ${{ inputs.channel != '' && inputs.channel || (github.ref_name == 'main' && 'test' || github.ref_name) }}
          SUITE: ${{ inputs.suite }}
        run: |
          if [ -f "scripts/test.sh" ]; then
            bash scripts/test.sh
          elif jq -e '.scripts.test' package.json > /dev/null; then
            bun run test
          else
            echo "No tests configured — install-only smoke test passed."
          fi
